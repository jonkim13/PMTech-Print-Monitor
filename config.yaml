# ============================================================
# PRINT FARM MONITOR - Configuration
# ============================================================
# Find the printer's hostname
# Find the password
# ============================================================

# How often to check each printer (using seconds)
poll_interval_sec: 5

# Web dashboard port
server_port: 5001

# ============================================================
# The Prusa Printers
# ============================================================
# Each printer needs: name, model, host, username, password
# Uploads go through the Pi relay via PrusaLink HTTP API
printers:
  core_one_1:
    name: "Core One #1"
    model: "core_one"
    host: "PrusaCoreOne-1.local"
    username: "maker"
    password: "${CORE_ONE_1_PASSWORD}"

  core_one_2:
    name: "Core One #2"
    model: "core_one"
    host: "PrusaCoreOne-2.local"
    username: "maker"
    password: "${CORE_ONE_2_PASSWORD}"

  xl_1:
    name: "XL #1"
    model: "xl"
    host: "PrusaXL-1.local"
    username: "maker"
    password: "${XL_1_PASSWORD}"

  xl_2:
    name: "XL #2"
    model: "xl"
    host: "PrusaXL-2.local"
    username: "maker"
    password: "${XL_2_PASSWORD}"

# ============================================================
# Database
# Path to the filament inventory database
# ============================================================
db_path: "data/FilamentInventory.db"

# ============================================================
# Drone Integration (not done yet)
# ============================================================
drone:
  enabled: false
  auto_dispatch: false
  cooldown_sec: 300

# ============================================================
# Custom Engraving (Phase E-2)
# Internal image -> engraved coaster STL generation.
# ============================================================
engraving:
  # Seconds a single background generation may run before the request
  # is marked failed with a timeout message.
  generation_timeout_sec: 300
  # Allowed quantity range for a custom-engraving work order.
  min_quantity: 1
  max_quantity: 50
  # Reject images outside these pixel bounds at upload time.
  min_dimension_px: 64
  max_dimension_px: 5000
  # Per-product defaults. product_key -> {display_name, material}.
  # Only Coaster_100mm_Square is enabled in the UI for now.
  products:
    Coaster_100mm_Square:
      display_name: "Custom Engraved Coaster (100mm Square)"
      material: "PLA"
