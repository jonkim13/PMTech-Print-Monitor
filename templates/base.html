<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PM Technologies Printer Monitor</title>
    <link rel="icon" type="image/png" sizes="256x256" href="{{ url_for('static', filename='img/favicon.png') }}">
    <link rel="shortcut icon" href="{{ url_for('static', filename='img/favicon.png') }}">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;600;700&family=Geist:wght@400;500;600;700&family=Geist+Mono:wght@400;500;600;700&family=Space+Grotesk:wght@400;500;600;700&display=swap" rel="stylesheet">
    <!-- Legacy per-page CSS for the un-redesigned tabs (Inventory,
         Production, Work Orders subtabs, History, Weekly Log).
         Loaded BEFORE print_monitor.css so 2.5a's new Dashboard rules
         win on shared selectors. -->
    <link rel="stylesheet" href="{{ url_for('static', filename='css/main.css') }}">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/print_monitor.css') }}">
</head>
<body>

{% block content %}{% endblock %}

<!-- ===== TOAST CONTAINER ===== -->
<div class="toast-container" id="toastContainer"></div>

<script>
window.APP_CONFIG = {
    pollIntervalMs: {{ poll_interval_ms | tojson }}
};
</script>

<!-- ===== SCRIPTS (order matters: utils first, then features) ===== -->
<script src="{{ url_for('static', filename='js/core/state.js') }}"></script>
<script src="{{ url_for('static', filename='js/core/dom.js') }}"></script>
<script src="{{ url_for('static', filename='js/core/nav.js') }}"></script>
<script src="{{ url_for('static', filename='js/core/status.js') }}"></script>
<script src="{{ url_for('static', filename='js/core/api.js') }}"></script>
<script src="{{ url_for('static', filename='js/pages/dashboard/poll.js') }}"></script>
<script src="{{ url_for('static', filename='js/pages/dashboard/index.js') }}"></script>
<script src="{{ url_for('static', filename='js/pages/dashboard/files.js') }}"></script>
<script src="{{ url_for('static', filename='js/pages/dashboard/assignment.js') }}"></script>
<script src="{{ url_for('static', filename='js/pages/dashboard/actions.js') }}"></script>
<script src="{{ url_for('static', filename='js/pages/inventory.js') }}"></script>
<script src="{{ url_for('static', filename='js/pages/production/index.js') }}"></script>
<script src="{{ url_for('static', filename='js/pages/production/jobs.js') }}"></script>
<script src="{{ url_for('static', filename='js/pages/production/machines.js') }}"></script>
<script src="{{ url_for('static', filename='js/pages/production/maintenance.js') }}"></script>
<script src="{{ url_for('static', filename='js/pages/production/materials.js') }}"></script>
<script src="{{ url_for('static', filename='js/pages/workorders/index.js') }}"></script>
<script src="{{ url_for('static', filename='js/pages/workorders/queue.js') }}"></script>
<script src="{{ url_for('static', filename='js/pages/workorders/detail.js') }}"></script>
<script src="{{ url_for('static', filename='js/pages/workorders/create.js') }}"></script>
<script src="{{ url_for('static', filename='js/pages/workorders/print-modal.js') }}"></script>
<script src="{{ url_for('static', filename='js/pages/history.js') }}"></script>
<script src="{{ url_for('static', filename='js/pages/weekly-log/index.js') }}"></script>
<script src="{{ url_for('static', filename='js/pages/weekly-log/summary.js') }}"></script>
<script src="{{ url_for('static', filename='js/pages/weekly-log/sections.js') }}"></script>
<script src="{{ url_for('static', filename='js/pages/weekly-log/timeline.js') }}"></script>

</body>
</html>
