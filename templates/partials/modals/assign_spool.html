<!-- ===== ASSIGN SPOOL MODAL ===== -->
<div class="modal-overlay" id="assignSpoolModal">
    <div class="modal" style="width: 420px;">
        <div class="modal-header">
            <h3>Assign filament spool</h3>
            <button class="modal-close" onclick="hideModal('assignSpoolModal')" aria-label="Close">&times;</button>
        </div>
        <div class="modal-body">
            <p>Printer: <strong id="assignPrinterName"></strong></p>
            <div class="form-group" id="assignToolGroup" style="display: none;">
                <label class="form-label">Tool / Nozzle</label>
                <select class="form-input" id="assignToolSelect">
                    <option value="0">Tool 1 (T1)</option>
                </select>
            </div>
            <div class="form-group">
                <label class="form-label">Select Spool</label>
                <select class="form-input" id="assignSpoolSelect">
                    <option value="">Loading...</option>
                </select>
            </div>
            <div class="form-group" style="display: flex; align-items: center; gap: 8px;">
                <input type="checkbox" id="assignWasDried" style="accent-color: var(--warn);">
                <label for="assignWasDried" style="font-size: 12px; color: var(--fg-3);">
                    Filament was dried
                </label>
            </div>
        </div>
        <div class="modal-footer">
            <button type="button" class="btn danger" onclick="unassignSpool()" style="margin-right: auto;">Unassign</button>
            <button type="button" class="btn ghost" onclick="hideModal('assignSpoolModal')">Cancel</button>
            <button type="button" class="btn primary" onclick="submitAssignSpool()">Assign</button>
        </div>
    </div>
</div>
