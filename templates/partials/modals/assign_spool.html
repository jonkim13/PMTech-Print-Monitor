<!-- ===== ASSIGN SPOOL MODAL ===== -->
<div class="modal-overlay" id="assignSpoolModal">
    <div class="modal" style="width: 420px;">
        <h2>Assign Filament Spool</h2>
        <p style="font-size: 12px; color: var(--text-secondary); margin-bottom: 16px;">
            Printer: <strong id="assignPrinterName"></strong>
        </p>
        <div class="form-group" id="assignToolGroup" style="display: none;">
            <label class="form-label">Tool / Nozzle</label>
            <select class="form-input" id="assignToolSelect">
                <option value="0">Tool 1 (T1)</option>
            </select>
        </div>
        <div class="form-group">
            <label class="form-label">Select Spool</label>
            <select class="form-input" id="assignSpoolSelect">
                <option value="">Loading...</option>
            </select>
        </div>
        <div class="form-group" style="display: flex; align-items: center; gap: 8px;">
            <input type="checkbox" id="assignWasDried" style="accent-color: var(--accent-orange);">
            <label for="assignWasDried" style="font-size: 12px; color: var(--text-secondary);">
                Filament was dried
            </label>
        </div>
        <div class="modal-actions">
            <button type="button" class="btn btn-danger" onclick="unassignSpool()" style="margin-right: auto;">Unassign</button>
            <button type="button" class="btn" onclick="hideModal('assignSpoolModal')">Cancel</button>
            <button type="button" class="btn btn-orange" onclick="submitAssignSpool()">Assign</button>
        </div>
    </div>
</div>
