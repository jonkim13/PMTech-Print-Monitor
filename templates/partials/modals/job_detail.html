<!-- ===== JOB DETAIL MODAL ===== -->
<div class="modal-overlay" id="jobDetailModal">
    <div class="modal" style="width: 600px; max-height: 80vh;">
        <div class="modal-header">
            <h3>Job detail <span id="jobDetailId" class="muted mono" style="font-size: 12px;"></span></h3>
            <button class="modal-close" onclick="hideModal('jobDetailModal')" aria-label="Close">&times;</button>
        </div>
        <div class="modal-body">
            <div id="jobDetailContent"></div>
            <div class="form-row" style="margin-top: 16px;">
                <div class="form-group" style="flex:1;">
                    <label class="form-label">Outcome</label>
                    <select class="form-input" id="jobOutcomeSelect">
                        <option value="unknown">Unknown</option>
                        <option value="pass">Pass</option>
                        <option value="fail">Fail</option>
                    </select>
                </div>
                <div class="form-group" style="flex:1;">
                    <label class="form-label">Operator</label>
                    <input type="text" class="form-input" id="jobOperatorInput" placeholder="Operator name">
                </div>
            </div>
            <div class="form-group">
                <label class="form-label">Notes</label>
                <textarea class="form-input" id="jobNotesInput" rows="3" placeholder="QC notes, observations..."></textarea>
            </div>
        </div>
        <div class="modal-footer">
            <button type="button" class="btn ghost" onclick="hideModal('jobDetailModal')">Close</button>
            <button type="button" class="btn primary" onclick="saveJobQC()">Save QC</button>
        </div>
    </div>
</div>
