<!-- ===== MAINTENANCE MODAL ===== -->
<div class="modal-overlay" id="maintenanceModal">
    <div class="modal" style="width: 420px;">
        <div class="modal-header">
            <h3>Log maintenance event</h3>
            <button class="modal-close" onclick="hideModal('maintenanceModal')" aria-label="Close">&times;</button>
        </div>
        <div class="modal-body">
            <div class="form-group">
                <label class="form-label">Printer</label>
                <select class="form-input" id="maintPrinterSelect"></select>
            </div>
            <div class="form-group">
                <label class="form-label">Event type</label>
                <select class="form-input" id="maintEventType">
                    <option value="maintenance">Maintenance</option>
                    <option value="calibration">Calibration</option>
                </select>
            </div>
            <div class="form-group">
                <label class="form-label">Notes</label>
                <textarea class="form-input" id="maintNotes" rows="3" placeholder="What was done..."></textarea>
            </div>
        </div>
        <div class="modal-footer">
            <button type="button" class="btn ghost" onclick="hideModal('maintenanceModal')">Cancel</button>
            <button type="button" class="btn go" onclick="submitMaintenance()">Log event</button>
        </div>
    </div>
</div>
