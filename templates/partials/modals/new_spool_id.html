<div class="modal-overlay" id="newSpoolIdModal">
    <div class="modal" style="width: 420px;">
        <div class="modal-header">
            <h3>Spool created</h3>
            <button class="modal-close" onclick="hideModal('newSpoolIdModal')" aria-label="Close">&times;</button>
        </div>
        <div class="modal-body">
            <p>Write this ID on the spool before closing.</p>
            <div style="margin-bottom: 4px; padding: 18px; border-radius: 10px; border: 1px solid rgba(52, 211, 153, 0.30); background: rgba(52, 211, 153, 0.10); text-align: center;">
                <div class="k">New spool ID</div>
                <div id="newSpoolIdValue" class="mono tab" style="font-size: 30px; font-weight: 700; letter-spacing: 1px; color: var(--ok); margin-top: 6px;">
                    --
                </div>
            </div>
        </div>
        <div class="modal-footer">
            <button type="button" class="btn go" onclick="hideModal('newSpoolIdModal')">Close</button>
        </div>
    </div>
</div>
