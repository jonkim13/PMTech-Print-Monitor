<!-- ===== PRINT FROM QUEUE MODAL ===== -->
<div class="modal-overlay" id="queuePrintModal">
    <div class="modal" style="width: 460px;">
        <div class="modal-header">
            <h3 id="queuePrintTitle">Print queue item</h3>
            <button class="modal-close" onclick="hideModal('queuePrintModal')" aria-label="Close">&times;</button>
        </div>
        <div class="modal-body">
            <div id="queuePrintInfo" class="muted" style="font-size: 12px; margin-bottom: 12px;"></div>
            <div class="form-group">
                <label class="form-label">Select printer (idle only)</label>
                <select class="form-input" id="queuePrintPrinter">
                    <option value="">Loading printers...</option>
                </select>
            </div>
            <div class="form-group">
                <label class="form-label">GCode file</label>
                <input type="file" class="form-input" id="queuePrintFile" accept=".gcode,.gco,.g,.bgcode" style="padding: 6px;">
            </div>
            <div class="form-group">
                <label class="form-label" for="queuePrintOperatorInitials">Operator initials</label>
                <input type="text" class="form-input" id="queuePrintOperatorInitials" maxlength="12" placeholder="Required" required>
            </div>
        </div>
        <div class="modal-footer">
            <button type="button" class="btn ghost" onclick="hideModal('queuePrintModal')">Cancel</button>
            <button type="button" class="btn go" id="queuePrintBtn" onclick="submitQueuePrint()">Send &amp; print</button>
        </div>
    </div>
</div>
