<!-- ===== UPDATE WEIGHT MODAL ===== -->
<div class="modal-overlay" id="updateWeightModal">
    <div class="modal" style="width: 360px;">
        <div class="modal-header">
            <h3>Update weight</h3>
            <button class="modal-close" onclick="hideModal('updateWeightModal')" aria-label="Close">&times;</button>
        </div>
        <div class="modal-body">
            <p>Spool: <strong id="weightSpoolId"></strong></p>
            <div class="form-group">
                <label class="form-label">New weight (grams)</label>
                <input type="number" class="form-input" id="weightInput" required min="0">
            </div>
        </div>
        <div class="modal-footer">
            <button type="button" class="btn ghost" onclick="hideModal('updateWeightModal')">Cancel</button>
            <button type="button" class="btn primary" onclick="submitUpdateWeight()">Update</button>
        </div>
    </div>
</div>
